services:
  backend-core:
    build: ./backend-core
    ports:
      - "8080:8080"
    environment:
      - GITEA_URL=${GITEA_URL}
      - DB_URL=postgres://user:pass@db:5432/devhub
    depends_on:
      - db
      - backend-ai

  backend-ai:
    build: ./backend-ai
    ports:
      - "8000:8000"
      - "50051:50051" # gRPC

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=devhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
