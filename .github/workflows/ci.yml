name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  workflow-lint:
    # ADR-0005: CI workflow YAML 의 정합성을 actionlint 로 머지 직전에 강제한다.
    # 별도 잡으로 분리해 다른 잡의 실패가 lint 결과를 가리지 않도록 한다.
    name: Workflow Lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      # FU-CI-3: go-build / module cache. setup-go@v5 caches modules when a
      # go.sum is at the repo root, but here the module lives in backend-core/.
      # Explicit cache keys make the cache work for both jobs.
      - name: Cache Go build + module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('backend-core/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Test
        run: make test

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    # PR #109 의 23 integration test (DEVHUB_TEST_DB_URL gate) 를 native PG 15
    # 환경에서 실 실행 — backend-unit job 은 skip 만 하므로 회귀 가드가 무효였음.
    # PR #110 (sprint claude/work_260514-f) 신설.
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Cache Go build + module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('backend-core/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup PostgreSQL (native, PG 15)
        # ADR-0003: no-docker policy — e2e job 의 동일 step 패턴 (pgdg apt repo +
        # 5432 cluster reset) 재사용. trust auth on loopback 은 CI 전용.
        run: |
          set -euo pipefail
          sudo systemctl stop postgresql 2>/dev/null || true
          sudo pg_dropcluster --stop 14 main 2>/dev/null || true
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          codename=$(lsb_release -cs)
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${codename}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-15
          sudo pg_dropcluster --stop 15 main 2>/dev/null || true
          sudo pg_dropcluster --stop 14 main 2>/dev/null || true
          sudo pg_createcluster --start --port=5432 15 main
          sudo -u postgres psql -c "CREATE USER runner SUPERUSER;"
          sudo -u postgres psql -c "CREATE DATABASE devhub OWNER runner;"
          conf=/etc/postgresql/15/main/pg_hba.conf
          sudo sed -i -E 's|^(host\s+all\s+all\s+127\.0\.0\.1/32)\s+\S+|\1 trust|' "$conf"
          sudo sed -i -E 's|^(host\s+all\s+all\s+::1/128)\s+\S+|\1 trust|' "$conf"
          sudo pg_ctlcluster 15 main restart
          timeout 30s bash -c 'until pg_isready -h 127.0.0.1 -p 5432; do sleep 1; done'

      - name: Apply migrations
        run: |
          set -euo pipefail
          GOBIN=/usr/local/bin go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1
          migrate -path backend-core/migrations -database "postgres://runner@localhost:5432/devhub?sslmode=disable" up

      - name: Run integration tests
        env:
          DEVHUB_TEST_DB_URL: postgres://runner@localhost:5432/devhub?sslmode=disable
        run: |
          cd backend-core && go test -count=1 -run 'TestIntegration_' ./internal/store/...

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Test
        run: make test-frontend

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # ADR-0003: no-docker policy. Native postgresql-15 is installed below in
    # the "Setup PostgreSQL (native)" step so this job stays consistent with
    # the prod deployment shape (test-server-deployment.md §1.2). The earlier
    # `services: postgres:15` sidecar container was removed.
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup PostgreSQL (native)
        # ADR-0003: install postgresql-15 from the official pgdg apt repo so
        # the CI postgres matches prod (PG 15) and the no-docker policy holds
        # at the CI layer. trust auth on localhost is CI-only (loopback never
        # leaves the runner). `runner` matches the user the rest of the job
        # uses in DB_URL strings (set in ci-setup.sh + Start Backend env).
        run: |
          set -euo pipefail
          # ubuntu-24.04 runners ship with a preinstalled PostgreSQL 14
          # cluster occupying port 5432. postgresql-common's postinst skips
          # auto-creating the new pg-15 cluster when 5432 is taken, which
          # leaves us with "cluster '15 main' does not exist" and a missing
          # socket. Drop the pg-14 cluster first so pg-15 owns 5432.
          sudo systemctl stop postgresql 2>/dev/null || true
          sudo pg_dropcluster --stop 14 main 2>/dev/null || true
          # pgdg apt repo + signing key.
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          codename=$(lsb_release -cs)
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${codename}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-15
          # postgres-common 의 postinst 가 자동 생성한 15/main 이 다른 cluster /
          # 잔여 socket 의 5432 점유로 5433 으로 만들어진 사례 관찰 (run
          # 25774911487 의 pg_lsclusters 출력). 명시적으로 drop + 5432 재생성.
          # drop 은 cluster 부재 시 silently no-op.
          sudo pg_dropcluster --stop 15 main 2>/dev/null || true
          sudo pg_dropcluster --stop 14 main 2>/dev/null || true
          sudo pg_createcluster --start --port=5432 15 main
          pg_lsclusters
          sudo -u postgres psql -c "CREATE USER runner SUPERUSER;"
          sudo -u postgres psql -c "CREATE DATABASE devhub OWNER runner;"
          # CI-only trust auth on localhost so DB_URL (no password) connects.
          conf=/etc/postgresql/15/main/pg_hba.conf
          sudo sed -i -E 's|^(host\s+all\s+all\s+127\.0\.0\.1/32)\s+\S+|\1 trust|' "$conf"
          sudo sed -i -E 's|^(host\s+all\s+all\s+::1/128)\s+\S+|\1 trust|' "$conf"
          sudo pg_ctlcluster 15 main restart
          timeout 30s bash -c 'until pg_isready -h 127.0.0.1 -p 5432; do sleep 1; done'
      
      # FU-CI-3: cache the same paths as backend-unit so reused.
      - name: Cache Go build + module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('backend-core/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Node dependencies
        run: cd frontend && npm ci

      # FU-CI-3: cache the Playwright browser bundles. Keyed on the lockfile
      # because the @playwright/test version drives the bundle revision.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # FU-CI-2 + FU-CI-3: split system deps (apt) from browser bundle so the
      # cache actually saves time. apt always runs (~5-10 s, no fresh runner
      # has the libs). The browser install step is skipped on cache hit, which
      # avoids the ~100 MB download. Browsers are scoped to `chromium`
      # because playwright.config.ts only declares the chromium project (with
      # channel="chrome").
      - name: Install Playwright system deps
        run: cd frontend && npx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd frontend && npx playwright install chromium
      
      - name: CI Environment Setup (Ory + DB)
        run: sudo ./scripts/ci-setup.sh
        env:
          DB_URL: postgres://runner@localhost:5432/devhub?sslmode=disable
          DEVHUB_KRATOS_WEBHOOK_TOKEN: ci-test-token-12345
      
      - name: Build App
        run: |
          # backend-core's main package lives at backend-core/main.go (no
          # cmd/httpapi sub-package). Build the root package.
          (cd backend-core && go build -o ../devhub-backend ./)
          (cd frontend && npm run build)
      
      - name: Start Ory Kratos
        # DSN + webhook token are hardcoded inside infra/idp/kratos.ci.yaml
        # (Ory does not expand ${VAR} in YAML), so no env wiring is needed.
        run: |
          kratos serve --config infra/idp/kratos.ci.yaml > kratos.log 2>&1 &

      - name: Start Ory Hydra
        # DSN is hardcoded inside infra/idp/hydra.ci.yaml. --dev is required
        # because the CI hydra serves over HTTP (no TLS).
        run: |
          hydra serve all --config infra/idp/hydra.ci.yaml --dev > hydra.log 2>&1 &
      
      - name: Wait for Ory Readiness
        run: |
          timeout 60s bash -c 'until curl -s http://localhost:4434/health/ready; do sleep 1; done'
          timeout 60s bash -c 'until curl -s http://localhost:4445/health/ready; do sleep 1; done'
      
      - name: Register OIDC Client
        run: ./infra/idp/scripts/register-devhub-client.sh
      
      - name: Start Backend
        env:
          # backend-core reads DB_URL (see internal/config/config.go), not DSN.
          DB_URL: postgres://runner@localhost:5432/devhub?sslmode=disable
          # Without DEVHUB_HYDRA_ADMIN_URL no bearer-token verifier is wired
          # and admin/RBAC routes reject E2E requests. Point at the CI Hydra.
          DEVHUB_HYDRA_ADMIN_URL: http://localhost:4445
          DEVHUB_HYDRA_PUBLIC_URL: http://localhost:4444
          DEVHUB_KRATOS_PUBLIC_URL: http://localhost:4433
          DEVHUB_KRATOS_ADMIN_URL: http://localhost:4434
          DEVHUB_KRATOS_WEBHOOK_TOKEN: ci-test-token-12345
        run: |
          ./devhub-backend > backend.log 2>&1 &
      
      - name: Start Frontend
        run: |
          cd frontend
          npm run start > ../frontend.log 2>&1 &
      
      - name: Wait for App Readiness
        # FU-CI-4: split the backend/frontend waits. Backend keeps 60s (fast).
        # Frontend uses Next.js 16 `next start` which cold-boots in 30-50s on
        # ubuntu-latest, so 60s was tight and prone to flake; 120s buys a
        # comfortable margin without blowing up the overall job time.
        run: |
          timeout 60s bash -c 'until curl -s http://localhost:8080/health; do sleep 1; done'
          timeout 120s bash -c 'until curl -s http://localhost:3000/; do sleep 1; done'
      
      - name: Run E2E Tests
        run: make e2e
        env:
          DSN: postgres://runner@localhost:5432/devhub?sslmode=disable
      
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
      
      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: "*.log"
