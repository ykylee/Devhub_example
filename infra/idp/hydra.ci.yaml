## hydra.ci.yaml — CI-specific Ory Hydra config
##

serve:
  public:
    port: 4444
    host: 0.0.0.0
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3000
      allowed_methods: [POST, GET]
      allowed_headers: [Authorization, Content-Type]
      allow_credentials: true
  admin:
    port: 4445
    host: 0.0.0.0
  cookies:
    same_site_mode: Lax

dsn: ${DSN_HYDRA}

urls:
  self:
    issuer: http://localhost:4444/
    public: http://localhost:4444/
  consent: http://localhost:8080/api/v1/auth/consent
  login: http://localhost:3000/auth/login
  logout: http://localhost:3000/auth/logout
  error: http://localhost:3000/auth/error
  post_logout_redirect: http://localhost:3000/

secrets:
  system:
    - "ci-only-do-not-use-in-prod-system-secret-bbbbbbbb"

oidc:
  subject_identifiers:
    supported_types: [public]

oauth2:
  expose_internal_errors: true
  pkce:
    enforced: true
    enforced_for_public_clients: true

strategies:
  access_token: jwt

log:
  level: debug
  format: text
