services:
  db:
    image: postgres:15
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-devhub}
    volumes:
      - devhub-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-devhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  hydra-migrate:
    image: oryd/hydra:v2.2.0
    command: migrate sql --yes '${HYDRA_DSN:-postgres://user:pass@db:5432/devhub?sslmode=disable&search_path=hydra}'
    environment:
      FRONTEND_PUBLIC_BASE_URL: ${FRONTEND_PUBLIC_BASE_URL:?set FRONTEND_PUBLIC_BASE_URL}
      HYDRA_PUBLIC_EXTERNAL_URL: ${HYDRA_PUBLIC_EXTERNAL_URL:?set HYDRA_PUBLIC_EXTERNAL_URL}
      HYDRA_DSN: ${HYDRA_DSN:-postgres://user:pass@db:5432/devhub?sslmode=disable&search_path=hydra}
    volumes:
      - ./:/repo:ro

  hydra:
    image: oryd/hydra:v2.2.0
    entrypoint:
      - /bin/sh
      - -lc
      - 'HYDRA_DSN_ESC=$${HYDRA_DSN//&/\\&}; sed -e "s|__FRONTEND_PUBLIC_BASE_URL__|$${FRONTEND_PUBLIC_BASE_URL}|g" -e "s|__HYDRA_PUBLIC_EXTERNAL_URL__|$${HYDRA_PUBLIC_EXTERNAL_URL}|g" -e "s|__HYDRA_DSN__|$${HYDRA_DSN_ESC}|g" /repo/infra/idp/hydra.deploy.yaml > /tmp/hydra.deploy.rendered.yaml && hydra serve all --config /tmp/hydra.deploy.rendered.yaml --dev'
    restart: unless-stopped
    environment:
      FRONTEND_PUBLIC_BASE_URL: ${FRONTEND_PUBLIC_BASE_URL:?set FRONTEND_PUBLIC_BASE_URL}
      HYDRA_PUBLIC_EXTERNAL_URL: ${HYDRA_PUBLIC_EXTERNAL_URL:?set HYDRA_PUBLIC_EXTERNAL_URL}
      HYDRA_DSN: ${HYDRA_DSN:-postgres://user:pass@db:5432/devhub?sslmode=disable&search_path=hydra}
    volumes:
      - ./:/repo:ro
    ports:
      - "${HYDRA_PUBLIC_PORT:-24444}:4444"
      - "${HYDRA_ADMIN_PORT:-24445}:4445"
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully

  kratos-migrate:
    image: oryd/kratos:v1.1.0
    command: migrate sql --yes '${KRATOS_DSN:-postgres://user:pass@db:5432/devhub?sslmode=disable&search_path=kratos}'
    environment:
      FRONTEND_PUBLIC_BASE_URL: ${FRONTEND_PUBLIC_BASE_URL:?set FRONTEND_PUBLIC_BASE_URL}
      KRATOS_PUBLIC_EXTERNAL_URL: ${KRATOS_PUBLIC_EXTERNAL_URL:?set KRATOS_PUBLIC_EXTERNAL_URL}
      KRATOS_ADMIN_EXTERNAL_URL: ${KRATOS_ADMIN_EXTERNAL_URL:?set KRATOS_ADMIN_EXTERNAL_URL}
      DEVHUB_KRATOS_WEBHOOK_TOKEN: ${DEVHUB_KRATOS_WEBHOOK_TOKEN:-dev-token}
      KRATOS_DSN: ${KRATOS_DSN:-postgres://user:pass@db:5432/devhub?sslmode=disable&search_path=kratos}
      KRATOS_HOOK_TARGET_URL: ${KRATOS_HOOK_TARGET_URL:-http://backend-core:8080/api/v1/integrations/kratos/hook/settings/password/after}
    volumes:
      - ./:/repo:ro
    working_dir: /repo

  kratos:
    image: oryd/kratos:v1.1.0
    entrypoint:
      - /bin/sh
      - -lc
      - 'KRATOS_DSN_ESC=$${KRATOS_DSN//&/\\&}; KRATOS_HOOK_TARGET_URL_ESC=$${KRATOS_HOOK_TARGET_URL//&/\\&}; sed -e "s|__FRONTEND_PUBLIC_BASE_URL__|$${FRONTEND_PUBLIC_BASE_URL}|g" -e "s|__KRATOS_PUBLIC_EXTERNAL_URL__|$${KRATOS_PUBLIC_EXTERNAL_URL}|g" -e "s|__KRATOS_ADMIN_EXTERNAL_URL__|$${KRATOS_ADMIN_EXTERNAL_URL}|g" -e "s|__DEVHUB_KRATOS_WEBHOOK_TOKEN__|$${DEVHUB_KRATOS_WEBHOOK_TOKEN}|g" -e "s|__KRATOS_DSN__|$${KRATOS_DSN_ESC}|g" -e "s|__KRATOS_HOOK_TARGET_URL__|$${KRATOS_HOOK_TARGET_URL_ESC}|g" /repo/infra/idp/kratos.deploy.yaml > /tmp/kratos.deploy.rendered.yaml && kratos serve --config /tmp/kratos.deploy.rendered.yaml'
    restart: unless-stopped
    environment:
      FRONTEND_PUBLIC_BASE_URL: ${FRONTEND_PUBLIC_BASE_URL:?set FRONTEND_PUBLIC_BASE_URL}
      KRATOS_PUBLIC_EXTERNAL_URL: ${KRATOS_PUBLIC_EXTERNAL_URL:?set KRATOS_PUBLIC_EXTERNAL_URL}
      KRATOS_ADMIN_EXTERNAL_URL: ${KRATOS_ADMIN_EXTERNAL_URL:?set KRATOS_ADMIN_EXTERNAL_URL}
      DEVHUB_KRATOS_WEBHOOK_TOKEN: ${DEVHUB_KRATOS_WEBHOOK_TOKEN:-dev-token}
      KRATOS_DSN: ${KRATOS_DSN:-postgres://user:pass@db:5432/devhub?sslmode=disable&search_path=kratos}
      KRATOS_HOOK_TARGET_URL: ${KRATOS_HOOK_TARGET_URL:-http://backend-core:8080/api/v1/integrations/kratos/hook/settings/password/after}
    volumes:
      - ./:/repo:ro
    working_dir: /repo
    ports:
      - "${KRATOS_PUBLIC_PORT:-24333}:4433"
      - "${KRATOS_ADMIN_PORT:-24334}:4434"
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully

  backend-ai:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-ykylee/devhub_example}/backend-ai:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "${BACKEND_AI_PORT:-8000}:8000"

  backend-core:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-ykylee/devhub_example}/backend-core:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "${BACKEND_CORE_PORT:-8080}:8080"
    environment:
      DB_URL: ${DB_URL:-postgres://user:pass@db:5432/devhub?sslmode=disable}
      BACKEND_AI_URL: ${BACKEND_AI_URL:-http://backend-ai:8000}
      DEVHUB_AUTH_DEV_FALLBACK: ${DEVHUB_AUTH_DEV_FALLBACK:-1}
      DEVHUB_HYDRA_ADMIN_URL: ${DEVHUB_HYDRA_ADMIN_URL:-http://hydra:4445}
      DEVHUB_HYDRA_PUBLIC_URL: ${DEVHUB_HYDRA_PUBLIC_URL:-http://hydra:4444}
      DEVHUB_KRATOS_PUBLIC_URL: ${DEVHUB_KRATOS_PUBLIC_URL:-http://kratos:4433}
      DEVHUB_KRATOS_ADMIN_URL: ${DEVHUB_KRATOS_ADMIN_URL:-http://kratos:4434}
      DEVHUB_KRATOS_WEBHOOK_TOKEN: ${DEVHUB_KRATOS_WEBHOOK_TOKEN:-dev-token}
    depends_on:
      backend-ai:
        condition: service_started
      hydra:
        condition: service_started
      kratos:
        condition: service_started

  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-ykylee/devhub_example}/frontend:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend-core:8080}
      OIDC_AUTH_URL: ${OIDC_AUTH_URL:?set OIDC_AUTH_URL}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:?set OIDC_REDIRECT_URI}
      NEXT_PUBLIC_OIDC_AUTH_URL: ${NEXT_PUBLIC_OIDC_AUTH_URL:?set NEXT_PUBLIC_OIDC_AUTH_URL}
      NEXT_PUBLIC_OIDC_REDIRECT_URI: ${NEXT_PUBLIC_OIDC_REDIRECT_URI:?set NEXT_PUBLIC_OIDC_REDIRECT_URI}
    depends_on:
      backend-core:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-23000}:80"
    volumes:
      - ./infra/nginx/devhub.deploy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started

volumes:
  devhub-postgres:
